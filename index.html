<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>買い物リストアプリ v3.4 Firebase</title>
<style>
*{box-sizing:border-box}
:root{
  color-scheme:dark;
  --bg:#111315;
  --panel:#1d2024;
  --panel2:#242930;
  --line:#59616d;
  --text:#f3f5f7;
  --muted:#aeb6c2;
  --brand:#36d399;
  --accent:#4ea1ff;
  --warn:#ffd166;
  --danger:#ff6b6b;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Yu Gothic","Meiryo",system-ui,sans-serif;
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:#181b1f;
  border-bottom:1px solid #38404a;
  padding:14px 16px;
}
.pullRefresh{
  position:fixed;
  top:62px;
  left:50%;
  z-index:20;
  min-width:170px;
  padding:9px 14px;
  border:1px solid #59616d;
  border-radius:7px;
  background:#242930;
  color:var(--text);
  text-align:center;
  font-size:13px;
  font-weight:700;
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,-70px);
  transition:transform .16s ease,opacity .16s ease;
}
.pullRefresh.visible{opacity:1}
.pullRefresh.refreshing{color:var(--brand)}
.titleRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  max-width:980px;
  margin:auto;
}
.headerTools{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
}
.orientationBtn{
  min-height:32px;
  margin:0;
  padding:5px 9px;
  border:1px solid #59616d;
  background:#2d333b;
  color:var(--text);
  font-size:12px;
  white-space:nowrap;
}
.orientationBtn[aria-pressed="true"]{
  border-color:var(--brand);
  color:var(--brand);
}
h1{
  margin:0;
  font-size:22px;
  color:#6ee7ff;
}
.status{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:13px;
  white-space:nowrap;
}
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#777;
}
.dot.ok{background:var(--brand)}
.dot.err{background:var(--danger)}
main{
  max-width:980px;
  margin:0 auto;
  padding:12px;
}
.section{
  margin:12px 0;
  padding:12px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
}
.section h2{
  margin:0 0 10px;
  font-size:17px;
}
label{
  display:block;
  margin:8px 0 4px;
  color:var(--muted);
  font-size:13px;
}
input,select,textarea,button{
  font:inherit;
}
input,select,textarea{
  width:100%;
  padding:9px;
  background:#15181c;
  color:var(--text);
  border:1px solid #59616d;
  border-radius:6px;
}
textarea{
  min-height:108px;
  resize:vertical;
  font-family:Consolas,monospace;
  font-size:12px;
}
button{
  min-height:38px;
  padding:8px 12px;
  margin:4px 4px 4px 0;
  border:0;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
}
button:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.btn-add{background:var(--brand);color:#0b1511}
.btn-del{background:var(--danger);color:white}
.btn-detail{background:var(--accent);color:white}
.btn-done{background:var(--warn);color:#17130a}
.btn-sub{background:#6b7280;color:white}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.hidden{display:none!important}
.store{
  background:linear-gradient(90deg,#2563eb,#4ea1ff);
  color:white;
  padding:8px;
  margin-top:10px;
  border-radius:8px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}
.item{
  display:grid;
  grid-template-columns:1fr auto auto;
  align-items:center;
  gap:8px;
  padding:8px;
  border-bottom:1px solid #3c434d;
}
.categoryGroup{border-left:3px solid var(--category-color,#8b949e)}
.categoryHeader{
  margin-top:7px;
  padding:5px 9px;
  background:#292e35;
  border-top:1px solid #414853;
  border-bottom:1px solid #414853;
  color:var(--category-color,#d6dbe1);
  font-size:16px;
  font-weight:700;
}
.category-0{--category-color:#57d38c}
.category-1{--category-color:#8bd450}
.category-2{--category-color:#52b8e8}
.category-3{--category-color:#ff7f87}
.category-4{--category-color:#f2cf5b}
.category-5{--category-color:#ba8cff}
.category-6{--category-color:#ff9f5a}
.category-7{--category-color:#72d5cf}
.category-8{--category-color:#aeb6c2}
.doneText{
  text-decoration:line-through;
  color:#8b949e;
}
.itemName{
  color:#ffffff;
  font-weight:700;
  font-size:18px;
}
.qtyWrap{
  display:flex;
  align-items:center;
  gap:4px;
}
.qtyBtn{
  width:36px;
  height:36px;
  padding:0;
  background:#555e6b;
  color:white;
  font-size:18px;
}
.qtyInput{
  width:64px!important;
  text-align:center;
}
.recipeRow{
  display:grid;
  grid-template-columns:1fr 76px 150px 1fr auto;
  gap:6px;
  margin-bottom:6px;
}
.recipeCard,.archiveCard{
  background:var(--panel2);
  border:1px solid #48515e;
  border-radius:8px;
  padding:8px;
  margin-top:8px;
}
.recipeTitle{
  color:#ffe08a;
  font-weight:700;
}
.recipeDetails{
  margin-top:14px;
  border-top:1px solid #48515e;
  padding-top:10px;
}
.recipeDetails summary{
  cursor:pointer;
  font-weight:700;
  color:#ffe08a;
  padding:6px 2px;
}
.recipeDetails summary::marker{color:var(--accent)}
.syncingButton{opacity:.72}
.recipePreviewItem{
  padding:6px;
  border-bottom:1px solid #3c434d;
}
.empty{
  color:var(--muted);
  padding:8px 0;
}
.mini{
  color:var(--muted);
  font-size:12px;
}
.rowActions{
  display:flex;
  justify-content:flex-end;
  flex-wrap:wrap;
}
@media(max-width:680px){
  .grid2{
    display:block;
  }
  .titleRow{align-items:flex-start}
  .headerTools{flex-direction:column;align-items:flex-end;gap:5px}
  h1{font-size:18px}
  .status{margin-top:6px}
  .item{
    grid-template-columns:1fr;
  }
  .recipeRow{
    grid-template-columns:1fr 72px;
  }
  .recipeRow .rCategory,.recipeRow .rStore,.recipeRow .btn-del{
    grid-column:auto;
  }
}
</style>
</head>
<body>
<header>
  <div class="titleRow">
    <h1>買い物リストアプリ v3.4 by由雅</h1>
    <div class="headerTools">
      <button type="button" class="orientationBtn" id="portraitLockBtn" aria-pressed="true" title="スマホ画面を縦向きに固定">▯ 縦固定 ON</button>
      <div class="status"><span id="syncDot" class="dot"></span><span id="syncStatus">未接続</span></div>
    </div>
  </div>
</header>
<div class="pullRefresh" id="pullRefresh" role="status" aria-live="polite">↓ 下に引いて更新</div>

<main>
  <section class="section">
    <h2>■ リスト作成</h2>
    <input id="listName" placeholder="リスト名">
    <div class="grid2">
      <div>
        <label>作成日</label>
        <input type="date" id="createDate">
      </div>
      <div>
        <label>購入予定日</label>
        <input type="date" id="buyDate">
      </div>
    </div>
    <button class="btn-add" id="newListBtn">新規作成</button>
  </section>

  <section class="section">
    <h2>■ 買い物リスト</h2>
    <div id="items"></div>
    <button class="btn-done" id="backupListBtn">買い物完了・アーカイブ保存</button>
  </section>

  <section class="section">
    <h2>■ 商品追加</h2>
    <select id="storeSelect"></select>
    <input id="itemName" placeholder="商品名">
    <label>小分類</label>
    <select id="itemCategory"></select>
    <label>数量</label>
    <div class="qtyWrap">
      <button type="button" class="qtyBtn" id="qtyDownBtn">−</button>
      <input id="itemQty" class="qtyInput" type="number" min="1" value="1">
      <button type="button" class="qtyBtn" id="qtyUpBtn">＋</button>
    </div>
    <button class="btn-add" id="addItemBtn">追加</button>
  </section>

  <section class="section">
    <h2>■ レシピから追加</h2>
    <select id="recipeSelect"></select>
    <button class="btn-detail" id="loadRecipeBtn">レシピ読込</button>
    <div id="recipePreview"></div>
    <button class="btn-add" id="addRecipeItemsBtn">選択商品を追加</button>
  </section>

  <section class="section">
    <h2>■ 店舗追加</h2>
    <input id="storeName" placeholder="店舗名">
    <button class="btn-add" id="addStoreBtn">追加</button>
  </section>

  <section class="section">
    <h2>■ レシピ管理</h2>
    <input id="recipeName" placeholder="レシピ名">
    <div id="recipeItems"></div>
    <button class="btn-detail" id="addRecipeRowBtn">材料を追加</button>
    <button class="btn-add" id="saveRecipeBtn">レシピ保存</button>
    <details class="recipeDetails" id="registeredRecipes">
      <summary>登録レシピ <span id="recipeCount">0件</span></summary>
      <div id="recipeList"></div>
    </details>
  </section>

  <section class="section" id="archiveList">
    <h2>■ アーカイブ</h2>
    <div id="archives"></div>
  </section>

  <section class="section hidden" id="archiveDetail">
    <button class="btn-sub" id="backArchiveBtn">← 戻る</button>
    <div id="detail"></div>
  </section>

  <section class="section" id="firebaseSection">
    <h2>■ Firebase設定</h2>
    <label>Firebase設定オブジェクト</label>
    <textarea id="firebaseConfig" spellcheck="false" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","appId":"..."}'></textarea>
    <div class="grid2">
      <div>
        <label>同期キー</label>
        <input id="syncKey" value="default-shopping-list" placeholder="家族や端末で同じキーを使う">
      </div>
      <div>
        <label>接続モード</label>
        <select id="authMode">
          <option value="anonymous">匿名ログインを使う</option>
          <option value="none">ログインなし</option>
        </select>
      </div>
    </div>
    <button class="btn-detail" id="connectBtn">Firebase接続</button>
    <button class="btn-sub" id="saveConfigBtn">設定を保存</button>
    <button class="btn-del" id="clearConfigBtn">設定を消去</button>
    <div class="mini">Firestore保存先: <span id="docPath">shoppingLists/default-shopping-list</span></div>
  </section>
</main>

<script type="module">
import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  getDocFromServer,
  setDoc,
  updateDoc,
  FieldPath,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const emptyList = () => ({ name:"", createDate:"", buyDate:"", stores:[] });
const emptyState = () => ({ current:emptyList(), recipes:[], archives:[] });
const configStorageKey = "shoppingListV32FirebaseConfig";
const syncKeyStorageKey = "shoppingListV32SyncKey";
const authModeStorageKey = "shoppingListV32AuthMode";
const portraitLockStorageKey = "shoppingListV34PortraitLock";
const categories = [
  "野菜、果物",
  "豆腐、納豆",
  "魚、海産物",
  "肉",
  "卵、乳製品",
  "加工食品",
  "調味料",
  "日用品",
  "その他"
];

let state = emptyState();
let selected = 0;
let recipePreviewData = [];
let app = null;
let db = null;
let activeDocRef = null;
let unsubscribe = null;
let connected = false;
let applyingRemote = false;
let saveTimer = null;
let lastSavePromise = Promise.resolve();
let purchaseStates = {};
const pendingPurchaseIds = new Set();
const toggleWriteVersions = new Map();
let reconnectTimer = null;
let reconnectAttempts = 0;
let lastServerSyncAt = 0;
let pullStartY = null;
let pullDistance = 0;
let refreshing = false;
let portraitLockEnabled = localStorage.getItem(portraitLockStorageKey) !== "false";
let portraitLockApplied = false;
let orientationFullscreenStarted = false;

const $ = id => document.getElementById(id);

function setStatus(text, type="idle"){
  $("syncStatus").textContent = text;
  $("syncDot").className = "dot" + (type === "ok" ? " ok" : type === "err" ? " err" : "");
}

function currentDocPath(){
  const key = ($("syncKey").value.trim() || "default-shopping-list").replace(/[\/#?[\]]/g, "-");
  $("docPath").textContent = `shoppingLists/${key}`;
  return key;
}

function parseFirebaseConfig(){
  const raw = $("firebaseConfig").value.trim();
  if(!raw){
    throw new Error("Firebase設定を入力してください。");
  }
  const cleaned = raw
    .replace(/^const\s+firebaseConfig\s*=\s*/,"")
    .replace(/^firebaseConfig\s*=\s*/,"")
    .replace(/;$/,"");
  return JSON.parse(cleaned);
}

function saveConnectionSettings(){
  localStorage.setItem(configStorageKey, $("firebaseConfig").value.trim());
  localStorage.setItem(syncKeyStorageKey, $("syncKey").value.trim() || "default-shopping-list");
  localStorage.setItem(authModeStorageKey, $("authMode").value);
  currentDocPath();
}

function loadConnectionSettings(){
  $("firebaseConfig").value = localStorage.getItem(configStorageKey) || "";
  $("syncKey").value = localStorage.getItem(syncKeyStorageKey) || "default-shopping-list";
  $("authMode").value = localStorage.getItem(authModeStorageKey) || "anonymous";
  currentDocPath();
}

function normalizeState(data){
  const next = data && typeof data === "object" ? data : {};
  const current = next.current && typeof next.current === "object" ? next.current : emptyList();
  current.stores = Array.isArray(current.stores) ? current.stores : [];
  current.stores.forEach((store,storeIndex)=>{
    store.name = store.name || "";
    store.items = Array.isArray(store.items) ? store.items : [];
    store.items.forEach((item,itemIndex)=>{
      item.id = item.id || `legacy-${storeIndex}-${itemIndex}`;
      item.name = item.name || "";
      item.category = normalizeCategory(item.category);
      item.qty = Math.max(1, Number(item.qty) || 1);
      item.done = Boolean(item.done);
    });
  });
  const normalizedRecipes = Array.isArray(next.recipes) ? next.recipes : [];
  normalizedRecipes.forEach(recipe=>{
    recipe.items = Array.isArray(recipe.items) ? recipe.items : [];
    recipe.items.forEach(item=>item.category = normalizeCategory(item.category));
  });
  return {
    current,
    recipes:normalizedRecipes,
    archives:Array.isArray(next.archives) ? next.archives : []
  };
}

async function connectFirebase(){
  try{
    saveConnectionSettings();
    setStatus("接続中...", "idle");
    const firebaseConfig = parseFirebaseConfig();
    app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    db = getFirestore(app);
    if($("authMode").value === "anonymous"){
      await signInAnonymously(getAuth(app));
    }
    activeDocRef = doc(db, "shoppingLists", currentDocPath());
    const snap = await getDoc(activeDocRef);
    if(!snap.exists()){
      await setDoc(activeDocRef, {
        ...state,
         schemaVersion:3.4,
        createdAt:serverTimestamp(),
        updatedAt:serverTimestamp()
      });
    }
    startRealtimeListener();
  }catch(error){
    connected = false;
    setStatus(error.message, "err");
  }
}

function applySnapshot(snapshot){
  applyingRemote = true;
  const remoteData = snapshot.data() || {};
  purchaseStates = remoteData.purchaseStates && typeof remoteData.purchaseStates === "object"
    ? remoteData.purchaseStates
    : {};
  state = normalizeState(remoteData);
  state.current.stores.forEach(store=>store.items.forEach(item=>{
    if(Object.prototype.hasOwnProperty.call(purchaseStates, item.id)){
      item.done = Boolean(purchaseStates[item.id]);
    }else{
      purchaseStates[item.id] = Boolean(item.done);
    }
  }));
  connected = true;
  applyingRemote = false;
  if(!snapshot.metadata.fromCache){
    lastServerSyncAt = Date.now();
    reconnectAttempts = 0;
  }
  setStatus(
    snapshot.metadata.hasPendingWrites
      ? "変更を送信中..."
      : snapshot.metadata.fromCache
        ? "端末内データを表示中"
        : "Firebase同期中",
    "ok"
  );
  render();
}

function startRealtimeListener(){
  clearTimeout(reconnectTimer);
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(
    activeDocRef,
    { includeMetadataChanges:true },
    applySnapshot,
    error=>{
      connected = false;
      unsubscribe = null;
      setStatus(`同期を再接続中: ${error.message}`, "err");
      scheduleReconnect();
    }
  );
}

function scheduleReconnect(){
  if(!activeDocRef || reconnectTimer) return;
  const delay = Math.min(30000, 1500 * (2 ** reconnectAttempts));
  reconnectAttempts += 1;
  reconnectTimer = setTimeout(()=>{
    reconnectTimer = null;
    startRealtimeListener();
  }, delay);
}

async function refreshFromServer(){
  if(refreshing) return;
  if(!activeDocRef){
    if($("firebaseConfig").value.trim()) await connectFirebase();
    else setStatus("Firebase設定後に更新してください", "err");
    resetPullIndicator();
    return;
  }
  refreshing = true;
  const indicator = $("pullRefresh");
  indicator.classList.add("visible", "refreshing");
  indicator.style.transform = "translate(-50%, 0)";
  indicator.textContent = "更新中...";
  setStatus("サーバーから更新中...", "idle");
  try{
    startRealtimeListener();
    const snapshot = await getDocFromServer(activeDocRef);
    applySnapshot(snapshot);
    indicator.textContent = "✓ 更新しました";
  }catch(error){
    connected = false;
    indicator.textContent = "更新できませんでした";
    setStatus(navigator.onLine ? `更新エラー: ${error.message}` : "オフラインです", "err");
    scheduleReconnect();
  }finally{
    refreshing = false;
    setTimeout(resetPullIndicator, 900);
  }
}

function resetPullIndicator(){
  pullDistance = 0;
  const indicator = $("pullRefresh");
  indicator.classList.remove("visible", "refreshing");
  indicator.style.transform = "translate(-50%, -70px)";
  indicator.textContent = "↓ 下に引いて更新";
}

function save(){
  if(applyingRemote || !connected || !db || !activeDocRef){
    render();
    return;
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    lastSavePromise = setDoc(activeDocRef, {
      ...state,
      schemaVersion:3.4,
      updatedAt:serverTimestamp()
    }, { merge:true }).catch(error=>{
      setStatus(`保存エラー: ${error.message}`, "err");
    });
  }, 220);
}

function recipes(){
  return state.recipes;
}

function archives(){
  return state.archives;
}

function changeAddQty(diff){
  let qty = Number($("itemQty").value || 1);
  qty += diff;
  if(qty < 1) qty = 1;
  $("itemQty").value = qty;
}

function newList(){
  if(state.current.stores.length && !confirm("現在のリストを破棄して新規作成しますか？")){
    return;
  }
  state.current = {
    name:$("listName").value.trim(),
    createDate:$("createDate").value,
    buyDate:$("buyDate").value,
    stores:[]
  };
  selected = 0;
  save();
  render();
}

function addStore(){
  const name = $("storeName").value.trim();
  if(!name) return;
  state.current.stores.push({ name, items:[] });
  $("storeName").value = "";
  save();
  render();
}

function addItem(){
  const itemName = $("itemName").value.trim();
  if(!itemName || state.current.stores.length === 0) return;
  state.current.stores[selected].items.push({
    id:crypto.randomUUID ? crypto.randomUUID() : `item-${Date.now()}-${Math.random().toString(36).slice(2)}`,
    name:itemName,
    category:normalizeCategory($("itemCategory").value),
    qty:Number($("itemQty").value) || 1,
    done:false
  });
  $("itemName").value = "";
  $("itemQty").value = 1;
  save();
  render();
}

async function toggle(storeIndex,itemIndex){
  const item = state.current.stores[storeIndex]?.items[itemIndex];
  if(!item) return;
  const previous = Boolean(item.done);
  const next = !previous;
  item.done = next;
  purchaseStates[item.id] = next;
  const version = (toggleWriteVersions.get(item.id) || 0) + 1;
  toggleWriteVersions.set(item.id, version);
  pendingPurchaseIds.add(item.id);
  render();
  if(!db || !activeDocRef){
    pendingPurchaseIds.delete(item.id);
    setStatus("未接続のため購入状態を保存できません", "err");
    render();
    return;
  }
  try{
    setStatus(navigator.onLine ? "購入状態を送信中..." : "オフライン・送信待ち", "idle");
    await updateDoc(
      activeDocRef,
      new FieldPath("purchaseStates", item.id), next,
      "updatedAt", serverTimestamp()
    );
  }catch(error){
    if(toggleWriteVersions.get(item.id) === version){
      item.done = previous;
      purchaseStates[item.id] = previous;
      setStatus(`購入状態の保存エラー: ${error.message}`, "err");
    }
  }finally{
    if(toggleWriteVersions.get(item.id) === version){
      pendingPurchaseIds.delete(item.id);
      if(connected) setStatus("Firebase同期中", "ok");
      render();
    }
  }
}

function delItem(storeIndex,itemIndex){
  state.current.stores[storeIndex]?.items.splice(itemIndex,1);
  save();
  render();
}

function delStore(storeIndex){
  if(!confirm("店舗を削除しますか？")) return;
  state.current.stores.splice(storeIndex,1);
  if(selected >= state.current.stores.length) selected = Math.max(0, state.current.stores.length - 1);
  save();
  render();
}

function qty(storeIndex,itemIndex,value){
  const item = state.current.stores[storeIndex]?.items[itemIndex];
  if(!item) return;
  item.qty = Math.max(1, Number(value) || 1);
  save();
}

function addRecipeRow(name="", qtyValue=1, store="", category="その他"){
  const row = document.createElement("div");
  row.className = "recipeRow";
  row.innerHTML = `
    <input class="rName" placeholder="材料名" value="${escapeAttr(name)}">
    <input class="rQty" type="number" min="1" value="${escapeAttr(qtyValue)}">
    <select class="rCategory" aria-label="小分類">${categoryOptions(category)}</select>
    <input class="rStore" placeholder="店舗" value="${escapeAttr(store)}">
    <button class="btn-del" type="button">削除</button>
  `;
  row.querySelector("button").addEventListener("click",()=>row.remove());
  $("recipeItems").appendChild(row);
}

function saveRecipe(){
  const recipeName = $("recipeName").value.trim();
  if(!recipeName){
    alert("レシピ名を入力してください。");
    return;
  }
  const items = [...document.querySelectorAll("#recipeItems .recipeRow")]
    .map(row=>({
      name:row.querySelector(".rName").value.trim(),
      qty:Number(row.querySelector(".rQty").value) || 1,
      category:normalizeCategory(row.querySelector(".rCategory").value),
      store:row.querySelector(".rStore").value.trim()
    }))
    .filter(item=>item.name);
  if(items.length === 0){
    alert("材料を入力してください。");
    return;
  }
  state.recipes.push({ name:recipeName, items });
  $("recipeName").value = "";
  $("recipeItems").innerHTML = "";
  addRecipeRow();
  save();
  render();
  alert("レシピを保存しました。");
}

function delRecipe(index){
  if(!confirm("レシピを削除しますか？")) return;
  state.recipes.splice(index,1);
  save();
  render();
}

function loadRecipe(){
  const recipeIndex = $("recipeSelect").value;
  const recipe = state.recipes[recipeIndex];
  if(recipeIndex === "" || !recipe) return;
  recipePreviewData = JSON.parse(JSON.stringify(recipe.items));
  $("recipePreview").innerHTML = recipe.items.map((item,index)=>`
    <div class="recipePreviewItem">
      <label>
        <input type="checkbox" class="recipeCheck" data-index="${index}" checked>
        ${escapeHtml(item.name)} × ${escapeHtml(item.qty)}（${escapeHtml(normalizeCategory(item.category))}／${escapeHtml(item.store || "店舗未設定")}）
      </label>
    </div>
  `).join("");
}

function addRecipeItems(){
  document.querySelectorAll(".recipeCheck").forEach(check=>{
    if(!check.checked) return;
    const item = recipePreviewData[Number(check.dataset.index)];
    if(!item) return;
    const storeName = item.store || "未分類";
    let storeIndex = state.current.stores.findIndex(store=>store.name === storeName);
    if(storeIndex === -1){
      state.current.stores.push({ name:storeName, items:[] });
      storeIndex = state.current.stores.length - 1;
    }
    const itemCategory = normalizeCategory(item.category);
    const existing = state.current.stores[storeIndex].items.find(x=>x.name === item.name && normalizeCategory(x.category) === itemCategory);
    if(existing){
      existing.qty += item.qty;
    }else{
      state.current.stores[storeIndex].items.push({
        id:crypto.randomUUID ? crypto.randomUUID() : `item-${Date.now()}-${Math.random().toString(36).slice(2)}`,
        name:item.name,
        category:itemCategory,
        qty:item.qty,
        done:false
      });
    }
  });
  save();
  render();
  alert("レシピの商品を追加しました。");
}

function backupList(){
  state.archives.push({
    savedAt:new Date().toLocaleString("ja-JP"),
    data:JSON.parse(JSON.stringify(state.current))
  });
  save();
  render();
  alert("アーカイブへ保存しました。");
}

function delArchive(index){
  if(!confirm("アーカイブを削除しますか？")) return;
  state.archives.splice(index,1);
  save();
  render();
}

function showArchive(index){
  const archive = state.archives[index];
  if(!archive) return;
  $("archiveList").classList.add("hidden");
  $("archiveDetail").classList.remove("hidden");
  let html = `
    <h2>${escapeHtml(archive.data.name || "無題")}</h2>
    <p>保存日時: ${escapeHtml(archive.savedAt)}</p>
    <p>作成日: ${escapeHtml(archive.data.createDate || "")}</p>
    <p>購入予定日: ${escapeHtml(archive.data.buyDate || "")}</p>
  `;
  archive.data.stores.forEach(store=>{
    html += `<hr><h3>${escapeHtml(store.name)}</h3>`;
    store.items.forEach(item=>{
      html += `${escapeHtml(item.name)} × ${escapeHtml(item.qty)}<br>`;
    });
  });
  $("detail").innerHTML = html;
}

function backArchive(){
  $("archiveDetail").classList.add("hidden");
  $("archiveList").classList.remove("hidden");
}

function render(){
  $("listName").value = state.current.name || "";
  $("createDate").value = state.current.createDate || "";
  $("buyDate").value = state.current.buyDate || "";

  const storeSelect = $("storeSelect");
  storeSelect.innerHTML = "";
  state.current.stores.forEach((store,index)=>{
    const option = document.createElement("option");
    option.value = index;
    option.textContent = store.name;
    storeSelect.appendChild(option);
  });
  if(state.current.stores.length){
    if(selected >= state.current.stores.length) selected = state.current.stores.length - 1;
    storeSelect.value = selected;
  }

  $("items").innerHTML = state.current.stores.length ? state.current.stores.map((store,storeIndex)=>`
    <div class="store">
      <span>${escapeHtml(store.name)}</span>
      <button class="btn-del" data-action="delStore" data-store="${storeIndex}">削除</button>
    </div>
    ${categories.map((category,categoryIndex)=>{
      const categoryItems = store.items
        .map((item,itemIndex)=>({item,itemIndex}))
        .filter(entry=>normalizeCategory(entry.item.category) === category);
      if(!categoryItems.length) return "";
      return `
      <div class="categoryHeader category-${categoryIndex}">${escapeHtml(category)}</div>
      <div class="categoryGroup category-${categoryIndex}">
      ${categoryItems.map(({item,itemIndex})=>`
      <div class="item">
        <span class="${item.done ? "doneText" : "itemName"}">${escapeHtml(item.name)}</span>
        <span class="qtyWrap">
          <input class="qtyInput" type="number" min="1" value="${escapeAttr(item.qty)}" data-action="qty" data-store="${storeIndex}" data-item="${itemIndex}">
        </span>
        <span class="rowActions">
          <button class="btn-sub ${pendingPurchaseIds.has(item.id) ? "syncingButton" : ""}" data-action="toggle" data-store="${storeIndex}" data-item="${itemIndex}">${pendingPurchaseIds.has(item.id) ? "同期中..." : item.done ? "戻す" : "購入済"}</button>
          <button class="btn-del" data-action="delItem" data-store="${storeIndex}" data-item="${itemIndex}">削除</button>
        </span>
      </div>
      `).join("")}
      </div>`;
    }).join("")}
  `).join("") : `<div class="empty">店舗と商品を追加してください。</div>`;

  $("recipeList").innerHTML = state.recipes.length ? state.recipes.map((recipe,index)=>`
    <div class="recipeCard">
      <div class="recipeTitle">${escapeHtml(recipe.name)}</div>
      <div>${escapeHtml(recipe.items.length)}件</div>
      <button class="btn-del" data-action="delRecipe" data-index="${index}">削除</button>
    </div>
  `).join("") : `<div class="empty">登録レシピはありません。</div>`;
  $("recipeCount").textContent = `${state.recipes.length}件`;

  $("recipeSelect").innerHTML = `<option value="">選択してください</option>` +
    state.recipes.map((recipe,index)=>`<option value="${index}">${escapeHtml(recipe.name)}</option>`).join("");

  $("archives").innerHTML = state.archives.length ? state.archives.map((archive,index)=>`
    <div class="archiveCard">
      <div>${escapeHtml(archive.data.name || "無題")}</div>
      <div class="mini">${escapeHtml(archive.savedAt)}</div>
      <button class="btn-detail" data-action="showArchive" data-index="${index}">詳細</button>
      <button class="btn-del" data-action="delArchive" data-index="${index}">削除</button>
    </div>
  `).join("") : `<div class="empty">アーカイブはありません。</div>`;
}

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, char=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[char]));
}

function escapeAttr(value){
  return escapeHtml(value);
}

function normalizeCategory(category){
  return categories.includes(category) ? category : "その他";
}

function categoryOptions(selected="その他"){
  const normalized = normalizeCategory(selected);
  return categories.map(category=>
    `<option value="${escapeAttr(category)}"${category === normalized ? " selected" : ""}>${escapeHtml(category)}</option>`
  ).join("");
}

function updatePortraitLockButton(message=""){
  const button = $("portraitLockBtn");
  button.setAttribute("aria-pressed", String(portraitLockEnabled));
  button.textContent = `▯ 縦固定 ${portraitLockEnabled ? "ON" : "OFF"}`;
  button.title = message || (portraitLockEnabled
    ? portraitLockApplied ? "縦向きに固定中。タップで解除" : "タップして縦固定を適用"
    : "タップして縦固定を有効化");
}

async function applyPortraitLock(enabled, fromUser=false){
  portraitLockEnabled = enabled;
  localStorage.setItem(portraitLockStorageKey, String(enabled));
  if(!enabled){
    try{ screen.orientation?.unlock(); }catch(_error){}
    portraitLockApplied = false;
    if(fromUser && orientationFullscreenStarted && document.fullscreenElement){
      try{ await document.exitFullscreen(); }catch(_error){}
    }
    orientationFullscreenStarted = false;
    updatePortraitLockButton();
    return;
  }
  try{
    if(!screen.orientation?.lock) throw new Error("orientation-lock-unsupported");
    try{
      await lockPortraitWithTimeout();
    }catch(error){
      if(!fromUser || !document.documentElement.requestFullscreen) throw error;
      if(!document.fullscreenElement){
        await document.documentElement.requestFullscreen();
        orientationFullscreenStarted = true;
      }
      await lockPortraitWithTimeout();
    }
    portraitLockApplied = true;
    updatePortraitLockButton();
  }catch(_error){
    portraitLockApplied = false;
    if(orientationFullscreenStarted && document.fullscreenElement){
      try{ await document.exitFullscreen(); }catch(_exitError){}
    }
    orientationFullscreenStarted = false;
    updatePortraitLockButton("このブラウザでは自動固定できません。端末側の縦向きロックを使用してください");
  }
}

function lockPortraitWithTimeout(){
  return Promise.race([
    screen.orientation.lock("portrait"),
    new Promise((_,reject)=>setTimeout(()=>reject(new Error("orientation-lock-timeout")),1500))
  ]);
}

async function handlePortraitLock(){
  if(portraitLockEnabled && !portraitLockApplied){
    await applyPortraitLock(true, true);
  }else{
    await applyPortraitLock(!portraitLockEnabled, true);
  }
}

function bindEvents(){
  $("portraitLockBtn").addEventListener("click", handlePortraitLock);
  $("connectBtn").addEventListener("click", connectFirebase);
  $("saveConfigBtn").addEventListener("click", ()=>{
    saveConnectionSettings();
    setStatus("設定を保存しました", "idle");
  });
  $("clearConfigBtn").addEventListener("click", ()=>{
    localStorage.removeItem(configStorageKey);
    localStorage.removeItem(syncKeyStorageKey);
    localStorage.removeItem(authModeStorageKey);
    loadConnectionSettings();
    setStatus("設定を消去しました", "idle");
  });
  $("syncKey").addEventListener("input", currentDocPath);
  $("newListBtn").addEventListener("click", newList);
  $("addStoreBtn").addEventListener("click", addStore);
  $("addItemBtn").addEventListener("click", addItem);
  $("qtyDownBtn").addEventListener("click", ()=>changeAddQty(-1));
  $("qtyUpBtn").addEventListener("click", ()=>changeAddQty(1));
  $("loadRecipeBtn").addEventListener("click", loadRecipe);
  $("addRecipeItemsBtn").addEventListener("click", addRecipeItems);
  $("addRecipeRowBtn").addEventListener("click", ()=>addRecipeRow());
  $("saveRecipeBtn").addEventListener("click", saveRecipe);
  $("backupListBtn").addEventListener("click", backupList);
  $("backArchiveBtn").addEventListener("click", backArchive);
  $("storeSelect").addEventListener("change", event=>{
    selected = Number(event.target.value);
  });
  document.addEventListener("click", event=>{
    const target = event.target.closest("button[data-action]");
    if(!target) return;
    const action = target.dataset.action;
    const store = Number(target.dataset.store);
    const item = Number(target.dataset.item);
    const index = Number(target.dataset.index);
    if(action === "toggle") toggle(store,item);
    if(action === "delItem") delItem(store,item);
    if(action === "delStore") delStore(store);
    if(action === "delRecipe") delRecipe(index);
    if(action === "showArchive") showArchive(index);
    if(action === "delArchive") delArchive(index);
  });
  document.addEventListener("change", event=>{
    if(event.target.dataset.action === "qty"){
      qty(Number(event.target.dataset.store), Number(event.target.dataset.item), event.target.value);
    }
  });
  document.addEventListener("keydown", event=>{
    if(event.key !== "Enter") return;
    const id = document.activeElement.id;
    if(id === "storeName") addStore();
    if(id === "itemName" || id === "itemQty") addItem();
  });
  window.addEventListener("beforeunload", ()=>{
    clearTimeout(saveTimer);
    clearTimeout(reconnectTimer);
  });
  window.addEventListener("online", ()=>{
    setStatus("オンライン復帰・更新中...", "idle");
    refreshFromServer();
  });
  window.addEventListener("offline", ()=>setStatus("オフライン・変更は送信待ち", "err"));
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState === "visible" && activeDocRef && Date.now() - lastServerSyncAt > 10000){
      refreshFromServer();
    }
  });
  document.addEventListener("touchstart", event=>{
    if(window.scrollY === 0 && !refreshing && event.touches.length === 1){
      pullStartY = event.touches[0].clientY;
    }
  }, { passive:true });
  document.addEventListener("touchmove", event=>{
    if(pullStartY === null || window.scrollY !== 0) return;
    pullDistance = Math.max(0, Math.min(110, (event.touches[0].clientY - pullStartY) * .55));
    if(pullDistance <= 0) return;
    event.preventDefault();
    const indicator = $("pullRefresh");
    indicator.classList.add("visible");
    indicator.style.transform = `translate(-50%, ${pullDistance - 58}px)`;
    indicator.textContent = pullDistance >= 58 ? "↑ 離して更新" : "↓ 下に引いて更新";
  }, { passive:false });
  document.addEventListener("touchend", ()=>{
    if(pullStartY === null) return;
    pullStartY = null;
    if(pullDistance >= 58) refreshFromServer();
    else resetPullIndicator();
  }, { passive:true });
  document.addEventListener("touchcancel", ()=>{
    pullStartY = null;
    resetPullIndicator();
  }, { passive:true });
}

loadConnectionSettings();
$("itemCategory").innerHTML = categoryOptions("その他");
updatePortraitLockButton();
bindEvents();
addRecipeRow();
render();
if(portraitLockEnabled && navigator.maxTouchPoints > 0){
  applyPortraitLock(true);
}
if($("firebaseConfig").value.trim()){
  connectFirebase();
}
</script>
</body>
</html>
